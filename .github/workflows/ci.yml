name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required docs
        run: |
          test -f README.md
          test -f SPEC.md
          test -f AGENTS.md
          test -f CHANGELOG.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
      - name: Check for obvious secret placeholders
        run: |
          ! grep -RInE '(private_key|preshared_key|BEGIN (RSA|OPENSSH|PRIVATE) KEY|AKIA[0-9A-Z]{16})' . \
            --exclude-dir=.git \
            --exclude=SECURITY.md
